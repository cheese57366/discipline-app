<!DOCTYPE html>
<html>

<head>
  <title>Discipline System</title>

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .layout {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .stats {
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 14px;
    }

    button:active {
      transform: scale(0.95);
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
      white-space: pre-line;
    }

    #floating {
      position: fixed;
      top: 50%;
      left: 50%;
      pointer-events: none;
      font-size: 20px;
      font-weight: bold;
      color: #22c55e;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translate(-50%,0); }
      100% { opacity: 0; transform: translate(-50%,-80px); }
    }

    .float {
      animation: floatUp 0.8s ease forwards;
    }

    .glow {
      color: #22c55e;
      text-shadow: 0 0 8px rgba(34,197,94,0.6);
    }

    .level-box {
      margin-top: 10px;
      padding: 10px;
      background: #eef2ff;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<h1>Discipline System</h1>

<div class="layout">

  <div class="card">

    <div class="stats">Days: <span id="days">0</span></div>
    <div class="stats">Points: <span id="points">0</span></div>
    <div class="stats">Streak: <span id="streak">0</span></div>

    <div class="level-box">
      <div>Level: <span id="level">1</span></div>
      <div>XP: <span id="xp">0</span> / <span id="xpReq">100</span></div>
    </div>

    <hr>

    <div class="stats">Lectures: <span id="lectures">0</span></div>
    <div class="stats">Revisions: <span id="revisions">0</span></div>

    <hr>

    <button id="lectureBtn">Lecture (+5)</button>
    <button id="revisionBtn">Revision (+7)</button>
    <button id="extraRevBtn">Extra Revision (+7)</button>
    <button id="mbBtn">MB (-3)</button>
    <button id="endDayBtn">End Day</button>

    <hr>

    <button id="resetBtn" style="background:#ef4444;">Reset</button>

  </div>

</div>

<div id="msg"></div>
<div id="floating"></div>

<script>

// DATA
let points = +localStorage.getItem("points") || 0;
let streak = +localStorage.getItem("streak") || 0;
let days = +localStorage.getItem("days") || 0;

let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

let lectures = 0;
let revisions = 0;

// UI
function updateUI() {
  document.getElementById("points").innerText = points;
  document.getElementById("streak").innerText = streak;
  document.getElementById("days").innerText = days;

  document.getElementById("lectures").innerText = lectures;
  document.getElementById("revisions").innerText = revisions;

  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;

  let xpReq = level * 100;
  document.getElementById("xpReq").innerText = xpReq;

  let streakEl = document.getElementById("streak");
  if (streak >= 3) streakEl.classList.add("glow");
  else streakEl.classList.remove("glow");
}

// SAVE
function save() {
  localStorage.setItem("points", points);
  localStorage.setItem("streak", streak);
  localStorage.setItem("days", days);
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  updateUI();
}

// FLOAT
function showFloat(text) {
  let el = document.getElementById("floating");
  el.innerText = text;
  el.classList.remove("float");
  void el.offsetWidth;
  el.classList.add("float");
}

// LEVEL SYSTEM
function addXP(amount) {
  xp += amount;
  let xpReq = level * 100;

  if (xp >= xpReq) {
    xp -= xpReq;
    level++;
    showFloat("LEVEL UP!");
  }
}

// BUTTONS
document.getElementById("lectureBtn").onclick = () => {
  lectures++;
  points += 5;
  addXP(5);
  showFloat("+5");
  save();
};

document.getElementById("revisionBtn").onclick = () => {
  if (revisions < lectures) {
    revisions++;
    points += 7;
    addXP(7);
    showFloat("+7");
  }
  save();
};

document.getElementById("extraRevBtn").onclick = () => {
  points += 7;
  addXP(7);
  showFloat("+7");
  save();
};

document.getElementById("mbBtn").onclick = () => {
  points -= 3;
  showFloat("-3");
  save();
};

// END DAY
document.getElementById("endDayBtn").onclick = () => {

  days++;

  if (lectures >= 5 && revisions >= 5) {
    streak++;
    showFloat("🔥 +STREAK");
    document.getElementById("msg").innerText = "Day Completed!";
  } else {
    streak = 0;
    document.getElementById("msg").innerText = "⚠️ Streak Broken";
  }

  // penalties
  if (lectures < 5) points -= (5 - lectures) * 2;
  if (revisions < 5) points -= (5 - revisions) * 3;

  lectures = 0;
  revisions = 0;

  save();
};

// RESET
document.getElementById("resetBtn").onclick = () => {
  let confirmReset = prompt("Type RESET to confirm");

  if (confirmReset !== "RESET") return;

  localStorage.clear();

  points = 0;
  streak = 0;
  days = 0;
  xp = 0;
  level = 1;
  lectures = 0;
  revisions = 0;

  showFloat("RESET");
  document.getElementById("msg").innerText = "Fresh Start";

  updateUI();
};

updateUI();

</script>

</body>
</html>
